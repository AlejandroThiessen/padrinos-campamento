<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Padrinos del Campamento — Transparencia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --paper: #F7FAF7;
    --surface: #FFFFFF;
    --ink: #1C2620;
    --ink-2: #47564D;
    --ink-3: #6E7F74;
    --line: #DCE5DD;
    --line-soft: #E8EFE9;
    --accent: #1E6B47;
    --accent-strong: #155436;
    --accent-soft: #E3F0E8;
    --gold: #9A7318;
    --gold-soft: #F6EED8;
    --meter-track: #E4ECE5;
    --shadow: 0 1px 2px rgba(28,38,32,.06), 0 4px 14px rgba(28,38,32,.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #111814;
      --surface: #18211B;
      --ink: #E8EFE9;
      --ink-2: #A9BAAE;
      --ink-3: #7E9084;
      --line: #2A362E;
      --line-soft: #222D26;
      --accent: #52B586;
      --accent-strong: #6FCA9C;
      --accent-soft: #1D3327;
      --gold: #D9B45C;
      --gold-soft: #322A15;
      --meter-track: #243029;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
    }
  }
  :root[data-theme="light"] {
    --paper: #F7FAF7; --surface: #FFFFFF; --ink: #1C2620; --ink-2: #47564D;
    --ink-3: #6E7F74; --line: #DCE5DD; --line-soft: #E8EFE9; --accent: #1E6B47;
    --accent-strong: #155436; --accent-soft: #E3F0E8; --gold: #9A7318;
    --gold-soft: #F6EED8; --meter-track: #E4ECE5;
    --shadow: 0 1px 2px rgba(28,38,32,.06), 0 4px 14px rgba(28,38,32,.05);
  }
  :root[data-theme="dark"] {
    --paper: #111814; --surface: #18211B; --ink: #E8EFE9; --ink-2: #A9BAAE;
    --ink-3: #7E9084; --line: #2A362E; --line-soft: #222D26; --accent: #52B586;
    --accent-strong: #6FCA9C; --accent-soft: #1D3327; --gold: #D9B45C;
    --gold-soft: #322A15; --meter-track: #243029;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
  }

  * { box-sizing: border-box; }
  html { background: var(--paper); }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background: var(--paper);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 28px 20px 72px; }

  /* ---------- demo banner ---------- */
  #demoBanner {
    display: none;
    background: var(--gold-soft);
    color: var(--gold);
    border: 1px dashed var(--gold);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13.5px;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 22px;
  }
  body.demo #demoBanner { display: block; }

  /* ---------- header ---------- */
  header { margin-bottom: 34px; }
  .topline {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap; margin-bottom: 26px;
  }
  .eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--accent);
  }
  .controls { display: flex; gap: 8px; }
  .ctl {
    font: inherit; font-size: 12.5px; font-weight: 600;
    color: var(--ink-2); background: var(--surface);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 5px 13px; cursor: pointer;
  }
  .ctl:hover { border-color: var(--accent); color: var(--accent); }
  .ctl:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(30px, 5.4vw, 44px);
    font-weight: 700; line-height: 1.12;
    margin: 0 0 12px; text-wrap: balance;
  }
  .lede { max-width: 62ch; color: var(--ink-2); font-size: 16.5px; margin: 0; }

  /* ---------- goal meter ---------- */
  .goal {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 26px 26px 22px;
    margin-bottom: 16px;
  }
  .goal-top { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .raised {
    font-family: Georgia, serif;
    font-size: clamp(34px, 6vw, 50px);
    font-weight: 700; line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
  }
  .of-goal { color: var(--ink-2); font-size: 15.5px; }
  .of-goal strong { color: var(--ink); font-variant-numeric: tabular-nums; }
  .pct { color: var(--ink-3); font-size: 14px; font-variant-numeric: tabular-nums; }
  .meter {
    position: relative; height: 12px; border-radius: 6px;
    background: var(--meter-track); margin: 18px 0 10px; overflow: hidden;
  }
  .meter-fill {
    position: absolute; inset: 0 auto 0 0; width: 0%;
    background: var(--accent); border-radius: 6px;
    transition: width .8s cubic-bezier(.2,.8,.2,1);
  }
  .meter-ticks { position: absolute; inset: 0; }
  .meter-ticks span {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: var(--paper); opacity: .9;
  }
  .meter-labels {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--ink-3); font-variant-numeric: tabular-nums;
  }
  @media (prefers-reduced-motion: reduce) { .meter-fill { transition: none; } }

  /* ---------- stat tiles ---------- */
  .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 44px; }
  @media (max-width: 560px) { .tiles { grid-template-columns: 1fr; } }
  .tile {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 18px;
  }
  .tile .k {
    font-size: 11.5px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--ink-3);
  }
  .tile .v {
    font-family: Georgia, serif; font-size: 26px; font-weight: 700;
    font-variant-numeric: tabular-nums; margin-top: 2px;
  }

  /* ---------- sections ---------- */
  section { margin-bottom: 46px; }
  h2 {
    font-family: Georgia, serif; font-size: 24px; font-weight: 700;
    margin: 0 0 6px; text-wrap: balance;
  }
  .sec-note { color: var(--ink-2); font-size: 14.5px; margin: 0 0 18px; max-width: 68ch; }

  /* ---------- sponsor wall ---------- */
  .wall { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .sponsor {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 12px; padding: 16px 18px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .sponsor.on-board { border-color: var(--gold); }
  .sponsor .name { font-weight: 700; font-size: 16px; }
  .sponsor .name.code { color: var(--ink-2); font-weight: 600; letter-spacing: .04em; }
  .sponsor .amt { color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums; }
  .logo-box {
    width: 100%; min-height: 76px; margin-bottom: 4px;
    display: flex; align-items: center; justify-content: center;
    background: var(--paper); border: 1px solid var(--line-soft);
    border-radius: 10px; padding: 10px;
  }
  .logo-box img { max-width: 100%; max-height: 58px; object-fit: contain; }
  .sponsor-line { display: inline-flex; align-items: center; gap: 8px; }
  .sponsor-mini-logo {
    width: 28px; height: 28px; object-fit: contain;
    border: 1px solid var(--line-soft); border-radius: 6px;
    background: var(--surface); padding: 3px; flex: none;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    align-self: flex-start;
    font-size: 11.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--gold); background: var(--gold-soft);
    border-radius: 999px; padding: 3px 10px;
  }
  .chip-anon {
    display: inline-flex; align-self: flex-start;
    font-size: 11.5px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
    color: var(--ink-3); background: var(--line-soft);
    border-radius: 999px; padding: 3px 10px;
  }
  .empty {
    border: 1.5px dashed var(--line); border-radius: 12px;
    padding: 30px 22px; text-align: center; color: var(--ink-3); font-size: 15px;
    grid-column: 1 / -1;
  }

  /* ---------- ledger tables ---------- */
  .table-scroll { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); }
  table { width: 100%; border-collapse: collapse; font-size: 14.5px; min-width: 540px; }
  th {
    text-align: left; font-size: 11.5px; font-weight: 700;
    letter-spacing: .09em; text-transform: uppercase; color: var(--ink-3);
    padding: 12px 16px; border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }
  td { padding: 11px 16px; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
  tbody tr:last-child td { border-bottom: 1px solid var(--line); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  td.folio { color: var(--ink-3); font-size: 13px; white-space: nowrap; }
  td.fecha { color: var(--ink-2); white-space: nowrap; }
  .star { color: var(--gold); }
  tfoot td {
    font-weight: 700; border-bottom: none;
    background: var(--accent-soft); color: var(--ink);
  }
  tfoot td:first-child { border-radius: 0 0 0 11px; }
  tfoot td:last-child { border-radius: 0 0 11px 0; }
  .match-note {
    display: flex; align-items: center; gap: 8px;
    margin-top: 10px; font-size: 13.5px; color: var(--accent);
  }
  .match-note .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); flex: none;
  }
  td.empty-cell { text-align: center; color: var(--ink-3); padding: 26px 16px; }

  /* ---------- how it works ---------- */
  .how { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media (max-width: 620px) { .how { grid-template-columns: 1fr; } }
  .how-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 12px; padding: 18px 20px;
  }
  .how-card h3 { margin: 0 0 6px; font-size: 15.5px; }
  .how-card p { margin: 0; color: var(--ink-2); font-size: 14px; }

  footer {
    border-top: 1px solid var(--line); padding-top: 22px;
    color: var(--ink-3); font-size: 13.5px; max-width: 68ch;
  }
</style>
</head>
<body>

<div class="wrap">
  <div id="demoBanner" data-i18n="demoBanner"></div>

  <header>

  <div class="tiles">
    <div class="tile"><div class="k" data-i18n="tSponsors"></div><div class="v" id="tSponsorsV">0</div></div>

    <div class="tile"><div class="k" data-i18n="tLeft"></div><div class="v" id="tLeftV">$0</div></div>
  </div>

  <section>
    <h2 data-i18n="wallH"></h2>
    <p class="sec-note" data-i18n="wallNote"></p>

  <section>

    <div class="table-scroll">

        <thead><tr>

      </table>
    </div>
    <div class="match-note"><span class="dot"></span><span data-i18n="matchNote"></span></div>
  </section>

  <section>
    <h2 data-i18n="spendH"></h2>
    <p class="sec-note" data-i18n="spendNote"></p>
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th data-i18n="colDate"></th>
          <th data-i18n="colConcept"></th>
          <th class="num" data-i18n="colAmount"></th>
        </tr></thead>
        <tbody id="spendBody"></tbody>
        <tfoot><tr>
          <td colspan="2" data-i18n="availRow"></td>
          <td class="num" id="availTotal">$0</td>
        </tr></tfoot>
      </table>
    </div>
  </section>

  <section>
    <h2 data-i18n="howH"></h2>
    <div class="how">
      <div class="how-card"><h3 data-i18n="how1H"></h3><p data-i18n="how1P"></p></div>
      <div class="how-card"><h3 data-i18n="how2H"></h3><p data-i18n="how2P"></p></div>
      <div class="how-card"><h3 data-i18n="how3H"></h3><p data-i18n="how3P"></p></div>
      <div class="how-card"><h3 data-i18n="how4H"></h3><p data-i18n="how4P"></p></div>
    </div>
  </section>

  <footer data-i18n="footer"></footer>
</div>

const fmt = v => new Intl.NumberFormat(STR[lang].locale,
  { style: "currency", currency: "MXN", maximumFractionDigits: 0 }).format(v);

const fmtDate = iso => {
  const [y, m, d] = iso.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString(STR[lang].locale,
    { day: "numeric", month: "short", year: "numeric" });
};

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function render() {
  const t = STR[lang];
  document.documentElement.lang = lang;
  document.title = lang === "es"
    ? "Padrinos del Campamento — Transparencia"
    : "Youth Camp Sponsor Board — Transparency";
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (t[key]) el.textContent = t[key];
  });
  document.getElementById("langBtn").textContent = lang === "es" ? "English" : "Español";

  const sponsors = PATROCINADORES
    .slice().sort((a, b) => a.folio.localeCompare(b.folio));
  const gastos = GASTOS;

  const raised = sponsors.reduce((s, p) => s + p.monto, 0);
  const spent = gastos.reduce((s, g) => s + g.monto, 0);
  const goal = CONFIG.meta;
  const pct = Math.min(100, raised / goal * 100);

  /* goal meter */
  document.getElementById("raised").textContent = fmt(raised);
  document.getElementById("goalAmt").textContent = fmt(goal);
  document.getElementById("goalLabel").textContent = fmt(goal);
  document.getElementById("pct").textContent = pct.toFixed(0) + "% " + t.pctOf;
  document.getElementById("meterFill").style.width = pct + "%";
  document.getElementById("meterEl").setAttribute("aria-label", t.meterLabel(fmt(raised), fmt(goal)));
  const ticks = document.getElementById("meterTicks");
  ticks.innerHTML = "";
  for (let v = 5000; v < goal; v += 5000) {
    const s = document.createElement("span");
    s.style.left = (v / goal * 100) + "%";
    ticks.appendChild(s);
  }

  /* stat tiles */
  document.getElementById("tSponsorsV").textContent = sponsors.length;
  document.getElementById("tBoardV").textContent =
    sponsors.filter(p => p.publico && p.monto >= CONFIG.umbralTablon).length;
  document.getElementById("tLeftV").textContent = fmt(Math.max(0, goal - raised));

  /* sponsor wall — biggest first */
  const wall = document.getElementById("wall");
  if (!sponsors.length) {
    wall.innerHTML = `<div class="empty">${esc(t.wallEmpty)}</div>`;
  } else {
    wall.innerHTML = sponsors.slice().sort((a, b) => b.monto - a.monto).map(p => {
      const onBoard = p.publico && p.monto >= CONFIG.umbralTablon;
      const nameCls = p.publico ? "name" : "name code";
      const logo = p.publico && p.logo
        ? `<div class="logo-box"><img src="${esc(p.logo)}" alt="${esc(p.nombre)} logo" loading="lazy"></div>`
        : "";
      const tag = onBoard
        ? `<span class="badge">${esc(t.onBoard)}</span>`
        : (!p.publico ? `<span class="chip-anon">${esc(t.anon)}</span>` : "");
      return `<div class="sponsor${onBoard ? " on-board" : ""}">
        ${logo}
        <span class="${nameCls}">${esc(p.nombre)}</span>
        <span class="amt">${fmt(p.monto)}</span>${tag}
      </div>`;
    }).join("");
  }

  /* donation ledger — chronological with running total */
  const body = document.getElementById("ledgerBody");
  if (!sponsors.length) {
    body.innerHTML = `<tr><td colspan="5" class="empty-cell">${esc(t.ledgerEmpty)}</td></tr>`;
  } else {
    let run = 0;
    body.innerHTML = sponsors.map(p => {
      run += p.monto;
      const star = p.publico && p.monto >= CONFIG.umbralTablon ? ` <span class="star">★</span>` : "";
      const logo = p.publico && p.logo
        ? `<img class="sponsor-mini-logo" src="${esc(p.logo)}" alt="${esc(p.nombre)} logo" loading="lazy">`
        : "";
      return `<tr>
        <td class="folio">${esc(p.folio)}</td>
        <td class="fecha">${esc(fmtDate(p.fecha))}</td>
        <td><span class="sponsor-line">${logo}<span>${esc(p.nombre)}${star}</span></span></td>
        <td class="num">${fmt(p.monto)}</td>
        <td class="num">${fmt(run)}</td>
      </tr>`;
    }).join("");
  }
  document.getElementById("ledgerTotal").textContent = fmt(raised);

  /* expenses */
  const sBody = document.getElementById("spendBody");
  if (!gastos.length) {
    sBody.innerHTML = `<tr><td colspan="3" class="empty-cell">${esc(t.spendEmpty)}</td></tr>`;
  } else {
    sBody.innerHTML = gastos.map(g => `<tr>
      <td class="fecha">${esc(fmtDate(g.fecha))}</td>
      <td>${esc(g.concepto)}</td>
      <td class="num">${fmt(g.monto)}</td>
    </tr>`).join("");
  }
  document.getElementById("availTotal").textContent = fmt(raised - spent);
}

document.getElementById("langBtn").addEventListener("click", () => {
  lang = lang === "es" ? "en" : "es";
  render();
});

render();
</script>
</body>
</html>
